<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mode Offline - Belajar Membaca</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, #ffedd5 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        color: #431407;
      }
      .card {
        background: white;
        border-radius: 2rem;
        padding: 2.5rem 2rem;
        max-width: 28rem;
        text-align: center;
        box-shadow: 0 20px 50px -10px rgba(234, 88, 12, 0.25);
        border: 3px solid #bfdbfe;
      }
      .emoji { font-size: 4rem; line-height: 1; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #3b5bdb; }
      p { color: #7c2d12; line-height: 1.6; margin-bottom: 1.25rem; }
      button {
        background: #4E71FF;
        color: white;
        border: none;
        padding: 0.875rem 1.75rem;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4);
        transition: transform 0.15s;
      }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">📚</div>
      <h1>Halo Pembaca Hebat!</h1>
      <p>
        Sekarang kamu sedang <b>offline</b> (tanpa internet).<br />
        Tenang, pelajaran yang sudah kamu buka tetap bisa dipakai ya! 🌟
      </p>
      <button onclick="window.location.href='/'">Mulai Belajar 🚀</button>
    </div>
  </body>
</html>
